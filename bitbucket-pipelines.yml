pipelines:
  branches:
    main:
      - step:
          name: Build and Deploy to S3/CloudFront
          image: node:24.13.1 # Or your preferred Node.js version
          caches:
            - node
          script:
            - npm install
            - VITE_API_URL=https://api.vigelon.com npm run build
            - pipe: atlassian/aws-s3-deploy:2.0.1
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: 'ca-central-1' # e.g., us-east-1
                S3_BUCKET: 'vigelon-dashboard-staging'
                LOCAL_PATH: 'dist' # Or your build output directory
            - pipe: atlassian/aws-cloudfront-invalidate:0.11.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: 'ca-central-1'
                DISTRIBUTION_ID: 'E2MI72RK0A6NFZ'
                PATHS: '/*' # Or specific paths to invalidate